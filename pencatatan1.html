<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencatatan Jual | HP Scound</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --border: #e2e8f0; --text: #1e293b; --sidebar-width: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        .sidebar { width: var(--sidebar-width); background: white; height: 100vh; border-right: 1px solid var(--border); position: fixed; padding: 25px; left: 0; }
        .sidebar h2 { color: var(--primary); margin-bottom: 30px; font-size: 22px; }
        .nav-item { text-decoration: none; color: #64748b; display: block; padding: 12px 0; font-weight: 500; }
        .nav-item.active { color: var(--primary); font-weight: 600; }

        .main { flex: 1; margin-left: var(--sidebar-width); padding: 40px; width: calc(100% - var(--sidebar-width)); }
        .card { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        
        label { display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; width: 100%; font-size: 14px; }
        .btn-save { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 8px; background: #f8fafc; font-size: 11px; color: #64748b; border-bottom: 1px solid var(--border); }
        td { padding: 12px 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>HP Scound</h2>
        <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
        <a href="stok.html" class="nav-item">📱 Stok Barang</a>
        <a href="pencatatan.html" class="nav-item active">📝 Pencatatan Jual</a>
        <a href="laporan.html" class="nav-item">📊 Laporan</a>
    </div>

    <div class="main">
        <h1>Pencatatan Jual</h1>
        <div class="card">
            <div class="form-grid">
                <div>
                    <label>Nama Pembeli</label>
                    <input type="text" id="pembeli" placeholder="Nama pembeli">
                </div>
                <div>
                    <label>Unit HP</label>
                    <select id="produk">
                        <option value="">-- Memuat Unit... --</option>
                    </select>
                </div>
                <div>
                    <label>Harga Jual (Rp)</label>
                    <input type="number" id="hargaJual" placeholder="Otomatis terisi">
                </div>
            </div>
            <button onclick="simpanPenjualan()" id="btnSimpan" class="btn-save">Simpan Transaksi</button>
        </div>

        <div class="card">
            <h3>Riwayat Penjualan Terbaru</h3>
            <table>
                <thead>
                    <tr>
                        <th>TANGGAL</th>
                        <th>PEMBELI</th>
                        <th>UNIT HP</th>
                        <th style="text-align:right;">HARGA</th>
                    </tr>
                </thead>
                <tbody id="tabelJual">
                    <tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwk_QgbEjKtDMSAk8tZAewDmRvDXR9zJdtUxko9wixU7M4XrwdFliB8EGiNIJEDZDEwBg/exec";
        let listStokReady = [];

        async function loadInitialData() {
            try {
                // Ambil data stok untuk dropdown (Hanya yang TERSEDIA)
                const resStok = await fetch(`${API_URL}?action=readStok`);
                const allData = await resStok.json();
                listStokReady = allData.filter(item => item.status === "TERSEDIA");

                const select = document.getElementById("produk");
                select.innerHTML = '<option value="">-- Pilih Unit --</option>';
                listStokReady.forEach(item => {
                    select.innerHTML += `<option value="${item.id}">${item.nama}</option>`;
                });

                // Ambil riwayat penjualan
                const resHist = await fetch(`${API_URL}?action=readHistory`);
                const history = await resHist.json();
                const tbody = document.getElementById("tabelJual");
                tbody.innerHTML = "";
                history.reverse().forEach(h => {
                    tbody.innerHTML += `<tr>
                        <td>${h.tanggal}</td>
                        <td>${h.pembeli}</td>
                        <td>${h.produk}</td>
                        <td style="text-align:right;">Rp ${parseInt(h.harga).toLocaleString()}</td>
                    </tr>`;
                });
            } catch (e) { console.error(e); }
        }

        // Auto-fill harga jual saat pilih unit
        document.getElementById("produk").addEventListener("change", function() {
            const detail = listStokReady.find(i => i.id == this.value);
            document.getElementById("hargaJual").value = detail ? detail.hargaJualRef : "";
        });

        async function simpanPenjualan() {
            const pembeli = document.getElementById("pembeli").value;
            const select = document.getElementById("produk");
            const harga = document.getElementById("hargaJual").value;

            if (!pembeli || !select.value || !harga) return alert("Isi semua data!");

            document.getElementById("btnSimpan").disabled = true;
            const url = `${API_URL}?action=addSale&nama=${encodeURIComponent(pembeli)}&id_hp=${select.value}&produk=${encodeURIComponent(select.options[select.selectedIndex].text)}&harga=${harga}`;

            try {
                await fetch(url);
                alert("Berhasil!");
                location.reload();
            } catch (e) { alert("Gagal!"); }
        }

        window.onload = loadInitialData;
    </script>
</body>
</html>
